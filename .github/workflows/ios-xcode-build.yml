name: iOS Xcode Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      upload_to_app_store:
        description: "Archive and upload to App Store Connect"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  simulator-build:
    name: Build for iOS Simulator
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore project source
        run: |
          cat ci/nox-project.tar.gz.b64.part-* | base64 --decode > "$RUNNER_TEMP/nox-project.tar.gz"
          tar -xzf "$RUNNER_TEMP/nox-project.tar.gz"

      - name: Select Xcode
        run: |
          XCODE_PATH="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -print | sort | tail -n 1)"
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::Xcode 26 is required for App Store uploads."
            find /Applications -maxdepth 1 -name 'Xcode*.app' -print
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version
          xcodebuild -showsdks | grep -E 'iphoneos26'

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Generate App Icon
        run: python3 ci/generate_app_icon.py

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project "NOX Apothecary.xcodeproj" \
            -scheme "NOX Apothecary" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO

  app-store-archive:
    name: Archive and Upload to App Store Connect
    runs-on: macos-26
    if: github.event_name == 'workflow_dispatch' && inputs.upload_to_app_store == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore project source
        run: |
          cat ci/nox-project.tar.gz.b64.part-* | base64 --decode > "$RUNNER_TEMP/nox-project.tar.gz"
          tar -xzf "$RUNNER_TEMP/nox-project.tar.gz"

      - name: Select Xcode
        run: |
          XCODE_PATH="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -print | sort | tail -n 1)"
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::Xcode 26 is required for App Store uploads."
            find /Applications -maxdepth 1 -name 'Xcode*.app' -print
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version
          xcodebuild -showsdks | grep -E 'iphoneos26'

      - name: Generate App Icon
        run: python3 ci/generate_app_icon.py

      - name: Validate signing secrets
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOX_APP_STORE_PROFILE_BASE64: ${{ secrets.NOX_APP_STORE_PROFILE_BASE64 }}
          APPLE_DISTRIBUTION_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          test -n "$APP_STORE_CONNECT_API_KEY_ID"
          test -n "$APP_STORE_CONNECT_ISSUER_ID"
          test -n "$APP_STORE_CONNECT_API_KEY_BASE64"
          test -n "$APPLE_TEAM_ID"
          test -n "$NOX_APP_STORE_PROFILE_BASE64"
          test -n "$APPLE_DISTRIBUTION_CERTIFICATE_P12_BASE64"
          test -n "$APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD"

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

      - name: Install App Store provisioning profile
        env:
          NOX_APP_STORE_PROFILE_BASE64: ${{ secrets.NOX_APP_STORE_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$NOX_APP_STORE_PROFILE_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/NOX_Apothecary_App_Store.mobileprovision"

      - name: Import Apple Distribution certificate
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/apple_distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$APPLE_DISTRIBUTION_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Archive
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "NOX Apothecary.xcodeproj" \
            -scheme "NOX Apothecary" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/NOX Apothecary.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="com.noxapothecary.app" \
            CODE_SIGN_STYLE="Manual" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="NOX Apothecary App Store CI"

      - name: Export IPA
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/NOX Apothecary.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "ci/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload IPA to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_PATH="$(find "$RUNNER_TEMP/export" -name "*.ipa" -maxdepth 1 | head -n 1)"
          test -n "$IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOX-Apothecary-IPA
          path: ${{ runner.temp }}/export/*.ipa
